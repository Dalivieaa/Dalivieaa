name: Generate Stats Card

on:
  schedule:
    - cron: "0 */12 * * *" # Jalan tiap 12 jam
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Stats Card
        run: |
          curl -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=Dalivieaa&show_icons=true&theme=tokyonight&count_private=true"
          curl -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=Dalivieaa&layout=compact&theme=tokyonight"
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git commit -m "Update GitHub Stats Card" || exit 0
          git push
