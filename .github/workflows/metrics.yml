name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: Dalivieaa
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Makassar
          plugin_languages: yes
          plugin_languages_limit: 8
